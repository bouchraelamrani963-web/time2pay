<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Factuur</title>

<style>
body { font-family: Arial; background:#f3f4f6; padding:40px; }

.factuur {
  background:white;
  padding:40px;
  max-width:800px;
  margin:auto;
  border-radius:10px;
}

.header {
  display:flex;
  justify-content:space-between;
  margin-bottom:30px;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th { border-bottom:2px solid black; padding:10px; }
td { border-bottom:1px solid #ddd; padding:10px; }

.totalen {
  width:300px;
  margin-left:auto;
  margin-top:20px;
}

.totalen div {
  display:flex;
  justify-content:space-between;
}

.totaal { font-weight:bold; font-size:18px; }

button {
  margin-top:30px;
  padding:10px 20px;
  background:black;
  color:white;
  border:none;
}

@media print {
  button { display:none; }
}
</style>
</head>

<body>

<div class="factuur">

<div class="header">
  <h2>Time2Pay</h2>
  <div>
    Factuur #: <span id="nr"></span><br>
    Datum: <span id="datum"></span>
  </div>
</div>

<div>
  <strong>Factuur voor:</strong><br>
  <span id="klant"></span><br>
  Nederland
</div>

<table>
<thead>
<tr>
<th>Datum</th>
<th>Uren</th>
<th>Tarief</th>
<th>Bedrag</th>
</tr>
</thead>

<tbody id="regels"></tbody>
</table>

<div class="totalen">
  <div><span>Subtotaal:</span><span id="sub"></span></div>
  <div><span>BTW (21%):</span><span id="btw"></span></div>
  <div class="totaal"><span>Totaal:</span><span id="tot"></span></div>
</div>

<button onclick="window.print()">Download PDF</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("uren")) || [];

let html = "";
let totaal = 0;
let klantNaam = "";

data.forEach(d=>{
  totaal += parseFloat(d.bedrag);
  klantNaam = d.klant;

  html += `<tr>
    <td>${d.datum}</td>
    <td>${d.uren}</td>
    <td>€${d.tarief}</td>
    <td>€${d.bedrag}</td>
  </tr>`;
});

let btw = totaal * 0.21;
let eind = totaal + btw;

document.getElementById("regels").innerHTML = html;
document.getElementById("sub").innerText = "€"+totaal.toFixed(2);
document.getElementById("btw").innerText = "€"+btw.toFixed(2);
document.getElementById("tot").innerText = "€"+eind.toFixed(2);
document.getElementById("klant").innerText = klantNaam;

document.getElementById("nr").innerText = Math.floor(Math.random()*100000);
document.getElementById("datum").innerText = new Date().toLocaleDateString();

</script>

</body>
</html>
